apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-backup.fullname" . }}
  labels:
    {{- include "k8s-backup.labels" . | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshots"]
  verbs: ["create", "deletecollection", "watch"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshots/status"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "create", "deletecollection"]
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["clusters"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "watch", "deletecollection", "get"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-backup.fullname" . }}
  labels:
    {{- include "k8s-backup.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-backup.fullname" . }}
  labels:
    {{- include "k8s-backup.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "k8s-backup.fullname" . }}
  apiGroup: ""
roleRef:
  kind: Role
  name: {{ include "k8s-backup.fullname" . }}
  apiGroup: rbac.authorization.k8s.io